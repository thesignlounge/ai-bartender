<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hydration — The Sign</title><link rel="stylesheet" href="style.css"></head>
<body class="page-shell">
<header><a class="brand" href="index.html"><span class="logo">S</span><span><b>The Sign</b><small>AI Cocktail Experience</small></span></a>
<div class="nav-links"><a href="index.html">AI Menu</a><a href="hydration.html">Hydration</a><a href="party.html">Party</a></div>
<button id="langBtn" class="pill">DE</button></header>
<section class="page-hero"><p class="eyebrow">SPRITZ · DISCOUNTS · HYDRATION</p><h1 id="pageTitle"></h1><p id="pageLead"></p></section>
<section id="pageGrid" class="page-grid"></section>
<section id="discountBoard" class="discount-board"></section>
<script src="menu-data.js"></script><script src="shared.js"></script>
<script>
let data=loadMenuData(),lang=activeLang();
const ids=data.hydration_ids;
function render(){
 document.documentElement.lang=lang;
 langBtn.textContent=lang==='en'?'DE':'EN';
 pageTitle.textContent=lang==='en'?data.settings.hydrationPageTitle_en:data.settings.hydrationPageTitle_de;
 pageLead.textContent=lang==='en'?'Spritz, Bellini and group discounts in one dedicated page.':'Spritz, Bellini und Gruppenrabatte auf einer eigenen Seite.';
 const drinks=ids.map(id=>data.drinks.find(d=>d.id===id)).filter(Boolean).filter(d=>d.visible!==false).sort(bySort);
 pageGrid.innerHTML=drinks.map(d=>`<article class="special-card"><span class="cat">${lang==='de'?d.category_de:d.category}</span><span class="price">${euro(d.price)}</span><h3>${d.name}</h3><p>${lang==='de'?d.desc_de:d.desc}</p><div class="tags">${(lang==='de'?d.tags_de:d.tags).map(t=>`<span>${t}</span>`).join('')}</div></article>`).join('');
 discountBoard.innerHTML=data.settings.discounts.map(x=>`<article class="discount-card"><b>${x.value}%</b><span>${lang==='en'?x.label_en:x.label_de}</span></article>`).join('');
}
langBtn.onclick=()=>{lang=lang==='en'?'de':'en';setActiveLang(lang);render()};
window.addEventListener('storage',()=>{data=loadMenuData();render()});
render();
</script></body></html>
