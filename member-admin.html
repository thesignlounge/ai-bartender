<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Staff Scanner · THE SIGN CLUB</title><link rel="stylesheet" href="style.css"></head>
<body class="club-page staff-page"><header class="club-header"><a href="index.html" class="brand"><img class="logo-mark" src="logo.png" alt="The Sign"><span><b>The Sign</b><small>Staff Scanner</small></span></a><span class="staff-only-label">STAFF ONLY</span></header>
<main class="club-shell staff-shell">
<section id="staffLogin" class="club-card staff-login"><p class="eyebrow">PROTECTED ACCESS</p><h1>Staff Scanner</h1><p>Bitte Staff-PIN eingeben.</p><input id="staffPin" type="password" inputmode="numeric" placeholder="PIN"><button id="staffLoginBtn" class="primary full club-gold-button">Öffnen</button><p id="staffLoginError" class="club-error" hidden>Falscher PIN</p></section>
<section id="scannerArea" hidden><section class="club-hero staff-hero"><p class="eyebrow">THE SIGN CLUB</p><h1>Staff Scanner</h1><p>Scan · Ergebnis · Bestätigen</p></section>
<section class="club-card scanner-card"><button id="startScan" class="primary full club-gold-button">▣ QR-Code scannen</button><video id="scanVideo" class="scan-video" playsinline hidden></video><div class="manual-code"><span>Computer-Test</span><input id="tokenInput" placeholder="QR-Link oder Token einfügen"><button id="checkToken" class="secondary full">Prüfen</button></div></section>
<section id="scanResult" class="club-card scan-result-card" hidden></section></section>
</main><script src="member-admin.js"></script></body></html>
